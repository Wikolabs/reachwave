version: "3.9"

# reachwave demo - production-ready POC.
# 2 services orchestrated:
#   - reachwave (Next.js frontend on host port 3003)
#   - reachwave-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  reachwave-backend:
    image: ghcr.io/wikolabs/reachwave-backend:latest
    container_name: reachwave-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  reachwave:
    image: ghcr.io/wikolabs/reachwave:latest
    container_name: reachwave
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      BACKEND_URL: "http://reachwave-backend:8000"
    depends_on:
      - reachwave-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
